events { worker_connections 1024; }

http {
  upstream bot   { server bot:3000; }
  upstream admin { server admin:3001; }

  server {
    listen 80;
    server_name bot.example.com;

    # Preserve the /bot/ prefix when forwarding to the upstream so NestJS
    # controllers mounted at @Controller('bot/...') receive the full path.
    location /bot/ {
      proxy_pass http://bot/bot/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 60s;
    }

    # Same for /admin/ — AdminController is @Controller('admin'), so the
    # prefix must reach the upstream verbatim.
    location /admin/ {
      proxy_pass http://admin/admin/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      allow 10.0.0.0/8;
      allow 192.168.0.0/16;
      deny all;
    }

    location /health {
      proxy_pass http://bot/health;
    }
  }
}